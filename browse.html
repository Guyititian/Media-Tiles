<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Browse Media Tiles</title>

<style>
body {
  background:#111;
  color:white;
  font-family:Arial;
  margin:20px;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  background: #111;
  padding: 10px 0;
  z-index: 20;
  border-bottom: 1px solid #222;
}

#brand {
  margin: 0;
  font-size: 18px;
  cursor: pointer;
  display: inline-block;
}

#contextTitle {
  font-size: 12px;
  opacity: 0.6;
  margin-top: 4px;
}

/* TABS */
.tabs {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:10px;
}

.tab {
  padding:8px 12px;
  background:#222;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  opacity:0.8;
  user-select:none;
}

.tab.active {
  background:white;
  color:black;
  opacity:1;
}

/* SEARCH */
input {
  width:100%;
  padding:10px;
  margin:10px 0 15px;
  border-radius:6px;
  border:none;
}

/* GROUPS */
section {
  margin-bottom:30px;
}

h2 {
  margin:20px 0 10px;
  font-size:16px;
  opacity:0.85;
  border-left: 3px solid #333;
  padding-left: 8px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:12px;
}

.tile {
  background:#222;
  padding:10px;
  border-radius:10px;
  text-align:center;
  transition:0.15s;
}

.tile:hover {
  transform: translateY(-2px);
}

.tile img {
  width:100%;
  border-radius:8px;
  cursor:pointer;
}

button {
  margin-top:6px;
  width:100%;
  padding:6px;
  cursor:pointer;
}

/* TOAST */
#toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: white;
  color: black;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  opacity: 0;
  transition: opacity 0.2s ease;
  pointer-events:none;
}
</style>
</head>

<body>

<div class="header">
  <h1 id="brand">Media Tiles</h1>
  <div id="contextTitle"></div>
  <div class="tabs" id="tabs"></div>
</div>

<input id="search" placeholder="Search tiles..." />

<div id="app">Loading...</div>

<div id="toast">Copied</div>

<script src="assets.js"></script>

<script>
let allItems = [];
let currentCategory = "all";

/* URL STATE */
const params = new URLSearchParams(window.location.search);
currentCategory = params.get("category") || "all";

/* COPY */
function copy(text) {
  navigator.clipboard.writeText(text);
  showToast("Copied link");
}

function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.style.opacity = "1";

  setTimeout(() => {
    toast.style.opacity = "0";
  }, 900);
}

/* HOME BUTTON */
document.getElementById("brand").onclick = () => {
  window.location.href = "index.html";
};

/* HEADER CONTEXT */
function updateHeader() {
  const context = document.getElementById("contextTitle");

  if (currentCategory === "all") {
    context.textContent = "All Media Tiles";
  } else {
    context.textContent = currentCategory.replace(/-/g, " ") + " collection";
  }
}

/* TABS */
function buildTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";

  const tabList = ["all", ...categories];

  tabList.forEach(cat => {
    const div = document.createElement("div");
    div.className = "tab";

    if (cat === currentCategory) div.classList.add("active");

    div.textContent = cat.replace(/-/g, " ");

    div.onclick = () => {
      currentCategory = cat;

      const url = cat === "all"
        ? "browse.html"
        : `browse.html?category=${cat}`;

      history.pushState({}, "", url);

      updateHeader();
      loadData();
      updateTabs();
    };

    tabs.appendChild(div);
  });
}

/* TAB STATE */
function updateTabs() {
  document.querySelectorAll(".tab").forEach(tab => {
    const label = tab.textContent.toLowerCase().replace(/ /g, "-");

    if (
      (currentCategory === "all" && tab.textContent.toLowerCase() === "all") ||
      label === currentCategory
    ) {
      tab.classList.add("active");
    } else {
      tab.classList.remove("active");
    }
  });
}

/* LOAD GROUPED DATA */
async function loadData() {
  const app = document.getElementById("app");
  app.innerHTML = "Loading...";

  const container = document.createElement("div");
  allItems = [];

  const list = currentCategory === "all"
    ? categories
    : [currentCategory];

  for (const cat of list) {
    try {
      const items = await fetchCategory(cat);
      allItems = allItems.concat(items);

      const section = document.createElement("section");

      const title = document.createElement("h2");
      title.textContent = cat.replace(/-/g, " ");

      const grid = document.createElement("div");
      grid.className = "grid";

      items.forEach(item => {
        const tile = document.createElement("div");
        tile.className = "tile";

        tile.innerHTML = `
          <img src="${item.url}" onclick="copy('${item.url}')"/>
          <div>${item.name}</div>
          <button onclick="copy('${item.url}')">Copy Link</button>
        `;

        grid.appendChild(tile);
      });

      section.appendChild(title);
      section.appendChild(grid);
      container.appendChild(section);

    } catch (e) {
      console.error(e);
    }
  }

  app.innerHTML = "";
  app.appendChild(container);
}

/* SEARCH */
document.getElementById("search").addEventListener("input", (e) => {
  const q = e.target.value.toLowerCase();

  const filtered = allItems.filter(i =>
    i.name.toLowerCase().includes(q)
  );

  const app = document.getElementById("app");
  app.innerHTML = "";

  const grid = document.createElement("div");
  grid.className = "grid";

  filtered.forEach(item => {
    const tile = document.createElement("div");
    tile.className = "tile";

    tile.innerHTML = `
      <img src="${item.url}" onclick="copy('${item.url}')"/>
      <div>${item.name}</div>
      <button onclick="copy('${item.url}')">Copy Link</button>
    `;

    grid.appendChild(tile);
  });

  app.appendChild(grid);
});

/* BACK BUTTON SUPPORT */
window.addEventListener("popstate", () => {
  const params = new URLSearchParams(window.location.search);
  currentCategory = params.get("category") || "all";

  updateHeader();
  loadData();
  updateTabs();
});

/* INIT */
updateHeader();
buildTabs();
loadData();

</script>

</body>
</html>
