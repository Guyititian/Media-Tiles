<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Media Tiles Library</title>

<style>
body {
  background:#070707;
  color:white;
  font-family:Arial;
  margin:0;
}

/* HEADER = STRONG LAYER AGAIN */
.header {
  position:sticky;
  top:0;

  padding:16px 20px;

  background: rgba(10,10,10,0.85);
  backdrop-filter: blur(14px);

  border-bottom:1px solid rgba(255,255,255,0.06);

  z-index:10;
}

/* BRAND = ANCHOR POINT */
#brand {
  font-size:22px;
  margin:0;
  cursor:pointer;

  display:inline-block;

  text-shadow:
    0 0 30px rgba(255,255,255,0.25),
    0 0 60px rgba(255,255,255,0.10);
}

/* CONTEXT = SECONDARY LAYER */
#contextTitle {
  font-size:12px;
  opacity:0.6;
  margin-top:4px;
}

/* TABS = MID LAYER (IMPORTANT FIX) */
.tabs {
  display:flex;
  gap:10px;
  margin-top:12px;
}

/* DEFAULT TAB */
.tab {
  padding:10px 14px;
  border-radius:10px;

  font-size:13px;

  background: rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.05);

  opacity:0.7;

  cursor:pointer;

  transition:0.2s;
}

/* ACTIVE TAB = IMPORTANT DEPTH SHIFT */
.tab.active {
  background: rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.18);

  box-shadow:
    0 0 25px rgba(255,255,255,0.08);

  transform: translateY(-2px);

  opacity:1;
}

/* SEARCH = OWN OBJECT LAYER */
input {
  width:calc(100% - 40px);
  margin:16px 20px;

  padding:14px;

  border-radius:12px;

  background: rgba(255,255,255,0.04);

  border:1px solid rgba(255,255,255,0.08);

  color:white;

  box-shadow:
    inset 0 0 15px rgba(0,0,0,0.5);
}

/* CONTENT LAYER */
section {
  padding:0 20px 40px;
}

h2 {
  font-size:14px;
  opacity:0.7;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:14px;
}

/* TILE = LOWEST LAYER (SUBTLE) */
.tile {
  background: rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.05);

  border-radius:12px;

  padding:10px;

  box-shadow:
    0 10px 25px rgba(0,0,0,0.5);

  transition:0.2s;
}

.tile:hover {
  transform: translateY(-4px);
  box-shadow:
    0 25px 60px rgba(0,0,0,0.8);
}

/* IMAGE */
.tile img {
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  border-radius:8px;
}

/* TEXT */
.tile-title {
  margin-top:6px;
  font-size:13px;
  opacity:0.8;
}

/* BUTTON */
.tile button {
  margin-top:8px;
  width:100%;
  padding:6px;

  border:none;
  border-radius:8px;

  background: rgba(255,255,255,0.06);
  color:white;
}

/* TOAST */
#toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 14px;
  border-radius:10px;

  background:white;
  color:black;

  opacity:0;
  transition:0.2s;
}
</style>
</head>

<body>

<div class="header">
  <h1 id="brand">Media Tiles</h1>
  <div id="contextTitle"></div>
  <div class="tabs" id="tabs"></div>
</div>

<input id="search" placeholder="Search tiles..." />

<div id="app"></div>

<div id="toast">Copied</div>

<script src="assets.js"></script>

<script>
let allItems = [];
let currentCategory = "all";

const params = new URLSearchParams(window.location.search);
currentCategory = params.get("category") || "all";

function copy(t){
  navigator.clipboard.writeText(t);
  document.getElementById("toast").style.opacity = "1";
  setTimeout(()=>document.getElementById("toast").style.opacity="0",900);
}

document.getElementById("brand").onclick = () => {
  window.location.href = "index.html";
};

function updateHeader(){
  document.getElementById("contextTitle").textContent =
    currentCategory === "all"
      ? "Library"
      : currentCategory + " collection";
}

function buildTabs(){
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";

  const list = ["all", ...categories];

  list.forEach(c=>{
    const d = document.createElement("div");
    d.className = "tab";

    if(c===currentCategory) d.classList.add("active");

    d.textContent = c;

    d.onclick = ()=>{
      currentCategory=c;
      history.pushState({}, "", c==="all"?"browse.html":`browse.html?category=${c}`);
      updateHeader();
      load();
      buildTabs();
    };

    tabs.appendChild(d);
  });
}

async function load(){
  const app = document.getElementById("app");
  app.innerHTML="";

  const list = currentCategory==="all"?categories:[currentCategory];

  for(const c of list){
    const items = await fetchCategory(c);

    const section = document.createElement("section");

    const h = document.createElement("h2");
    h.textContent = c;

    const grid = document.createElement("div");
    grid.className="grid";

    items.forEach(i=>{
      const t = document.createElement("div");
      t.className="tile";

      t.innerHTML=`
        <img src="${i.url}" onclick="copy('${i.url}')"/>
        <div class="tile-title">${i.name}</div>
        <button onclick="copy('${i.url}')">Copy</button>
      `;

      grid.appendChild(t);
    });

    section.appendChild(h);
    section.appendChild(grid);
    app.appendChild(section);
  }
}

updateHeader();
buildTabs();
load();
</script>

</body>
</html>
