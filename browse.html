<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Browse Media Tiles</title>

<style>
body {
  background: radial-gradient(circle at top, #151515, #0f0f0f);
  color:white;
  font-family:Arial;
  margin:0;
  padding:20px;
}

/* =========================
   HEADER (BRAND ANCHOR)
========================= */
.header {
  position: sticky;
  top: 0;
  z-index: 50;

  background: rgba(15,15,15,0.85);
  backdrop-filter: blur(10px);

  padding: 14px 0 10px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

/* BRAND = LOGO FEEL */
#brand {
  margin: 0;
  font-size: 22px;
  letter-spacing: 1px;
  font-weight: bold;

  display:inline-block;
  padding:6px 12px;

  border-radius:10px;

  background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
  border: 1px solid rgba(255,255,255,0.08);

  box-shadow: 0 10px 30px rgba(0,0,0,0.4);

  cursor:pointer;
}

#brand:hover {
  border-color: rgba(140,160,255,0.3);
  box-shadow: 0 0 25px rgba(120,140,255,0.15);
}

#contextTitle {
  font-size: 12px;
  opacity: 0.6;
  margin-top: 6px;
}

/* =========================
   TABS (DEPTH FIXED)
========================= */
.tabs {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:12px;
}

.tab {
  padding:9px 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius:10px;

  cursor:pointer;
  font-size:13px;
  opacity:0.8;

  transition: all 0.2s ease;
}

.tab:hover {
  transform: translateY(-2px);
  border-color: rgba(140,160,255,0.25);
  opacity:1;
}

.tab.active {
  background: rgba(255,255,255,0.12);
  border-color: rgba(140,160,255,0.4);
  box-shadow: 0 10px 25px rgba(0,0,0,0.35);
  opacity:1;
}

/* =========================
   SEARCH (DEPTH RESTORED)
========================= */
input {
  width:100%;
  padding:12px 14px;
  margin:14px 0 18px;

  border-radius:10px;
  border:1px solid rgba(255,255,255,0.08);

  background: rgba(255,255,255,0.04);
  color:white;

  outline:none;

  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.4);
}

input:focus {
  border-color: rgba(140,160,255,0.4);
  box-shadow: 0 0 18px rgba(120,140,255,0.15);
}

/* =========================
   LAYOUT
========================= */
section {
  margin-bottom:50px;
}

h2 {
  margin:24px 0 14px;
  font-size:15px;
  opacity:0.9;
}

/* GRID (slightly larger tiles) */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:16px;
}

/* =========================
   TILE (WINDOW MODEL)
========================= */
.tile {
  background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
  border: 1px solid rgba(255,255,255,0.08);
  border-radius:14px;

  overflow:hidden;

  display:flex;
  flex-direction:column;

  box-shadow: 0 10px 30px rgba(0,0,0,0.45);

  transition: all 0.25s ease;
}

.tile:hover {
  transform: translateY(-6px);
  border-color: rgba(120,140,255,0.35);
  box-shadow: 0 25px 60px rgba(0,0,0,0.65);
}

/* IMAGE = CLEAN WINDOW */
.tile img {
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  display:block;

  border-bottom: 1px solid rgba(255,255,255,0.06);
}

/* TITLE */
.tile-title {
  padding:10px;
  font-size:13px;

  opacity:0.9;

  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

/* BUTTON */
.tile button {
  margin:10px;
  margin-top:auto;

  padding:8px;

  border:none;
  border-radius:8px;

  background: rgba(255,255,255,0.08);
  color:white;

  cursor:pointer;
}

.tile button:hover {
  background: rgba(140,160,255,0.2);
}

/* =========================
   TOAST
========================= */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);

  background: rgba(255,255,255,0.95);
  color:black;

  padding: 10px 14px;
  border-radius: 10px;

  font-size: 13px;

  opacity: 0;
  transition: all 0.25s ease;

  pointer-events: none;
}

</style>
</head>

<body>

<div class="header">
  <h1 id="brand">Media Tiles</h1>
  <div id="contextTitle"></div>
  <div class="tabs" id="tabs"></div>
</div>

<input id="search" placeholder="Search tiles..." />

<div id="app">Loading...</div>

<div id="toast">Copied</div>

<script src="assets.js"></script>

<script>
let allItems = [];
let currentCategory = "all";

const params = new URLSearchParams(window.location.search);
currentCategory = params.get("category") || "all";

/* COPY */
function copy(text) {
  navigator.clipboard.writeText(text);
  showToast("Copied ✓");
}

function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;

  toast.style.opacity = "1";

  setTimeout(() => {
    toast.style.opacity = "0";
  }, 1100);
}

/* BRAND CLICK */
document.getElementById("brand").onclick = () => {
  window.location.href = "index.html";
};

/* HEADER TEXT */
function updateHeader() {
  const context = document.getElementById("contextTitle");

  context.textContent =
    currentCategory === "all"
      ? "All Media Tiles"
      : currentCategory.replace(/-/g, " ") + " collection";
}

/* TABS */
function buildTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";

  const tabList = ["all", ...categories];

  tabList.forEach(cat => {
    const div = document.createElement("div");
    div.className = "tab";

    if (cat === currentCategory) div.classList.add("active");

    div.textContent = cat.replace(/-/g, " ");

    div.onclick = () => {
      currentCategory = cat;

      const url = cat === "all"
        ? "browse.html"
        : `browse.html?category=${cat}`;

      history.pushState({}, "", url);

      updateHeader();
      loadData();
      buildTabs();
    };

    tabs.appendChild(div);
  });
}

/* LOAD */
async function loadData() {
  const app = document.getElementById("app");
  app.innerHTML = "Loading...";

  allItems = [];

  const list = currentCategory === "all"
    ? categories
    : [currentCategory];

  const container = document.createElement("div");

  for (const cat of list) {
    const items = await fetchCategory(cat);
    allItems = allItems.concat(items);

    const section = document.createElement("section");

    const title = document.createElement("h2");
    title.textContent = `${cat.replace(/-/g, " ")} (${items.length})`;

    const grid = document.createElement("div");
    grid.className = "grid";

    items.forEach(item => {
      const tile = document.createElement("div");
      tile.className = "tile";

      tile.innerHTML = `
        <img src="${item.url}" onclick="copy('${item.url}')"/>
        <div class="tile-title">${item.name}</div>
        <button onclick="copy('${item.url}')">Copy Link</button>
      `;

      grid.appendChild(tile);
    });

    section.appendChild(title);
    section.appendChild(grid);
    container.appendChild(section);
  }

  app.innerHTML = "";
  app.appendChild(container);
}

/* SEARCH */
document.getElementById("search").addEventListener("input", (e) => {
  const q = e.target.value.toLowerCase();

  const filtered = allItems.filter(i =>
    i.name.toLowerCase().includes(q)
  );

  const app = document.getElementById("app");
  app.innerHTML = "";

  const grid = document.createElement("div");
  grid.className = "grid";

  filtered.forEach(item => {
    const tile = document.createElement("div");
    tile.className = "tile";

    tile.innerHTML = `
      <img src="${item.url}" onclick="copy('${item.url}')"/>
      <div class="tile-title">${item.name}</div>
      <button onclick="copy('${item.url}')">Copy Link</button>
    `;

    grid.appendChild(tile);
  });

  app.appendChild(grid);
});

/* INIT */
updateHeader();
buildTabs();
loadData();

</script>

</body>
</html>
