<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Browse Media Tiles</title>

<style>
body {
  background: radial-gradient(circle at top, #151515, #0b0b0b 70%);
  color:white;
  font-family:Arial;
  margin:0;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  background: rgba(15,15,15,0.9);
  backdrop-filter: blur(8px);
  padding: 18px 20px;
  z-index: 20;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

/* BRAND (NOW A REAL LOGO) */
#brand {
  margin: 0;
  font-size: 28px;
  cursor: pointer;
  letter-spacing:1px;

  background: linear-gradient(90deg, #ffffff, #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  text-shadow: 0 0 20px rgba(168,85,247,0.25);
}

/* CONTEXT (LIBRARY INDICATOR) */
#contextTitle {
  font-size: 13px;
  margin-top: 4px;
  opacity: 0.6;
}

/* TABS */
.tabs {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:14px;
}

.tab {
  padding:8px 14px;
  background:#1c1c1c;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
  opacity:0.8;

  transition: all 0.2s ease;
}

.tab:hover {
  background:#252525;
}

/* ACTIVE TAB = HALO */
.tab.active {
  background:#a855f7;
  color:white;
  opacity:1;
  box-shadow: 0 0 12px rgba(168,85,247,0.5);
}

/* SEARCH */
input {
  width:calc(100% - 40px);
  margin:20px;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#1c1c1c;
  color:white;
}

/* SECTIONS */
section {
  margin: 30px 20px;
  padding-bottom:10px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

h2 {
  margin:20px 0 12px;
  font-size:18px;
  opacity:0.9;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:16px;
}

/* TILE */
.tile {
  background:#1c1c1c;
  padding:10px;
  border-radius:12px;
  display:flex;
  flex-direction:column;
  height:100%;

  border:1px solid rgba(255,255,255,0.05);

  transition: all 0.2s ease;
}

/* TILE HOVER (MATCH TOOLS STYLE) */
.tile:hover {
  transform: translateY(-4px) scale(1.02);
  box-shadow: 0 0 20px rgba(168,85,247,0.25);
  border-color: rgba(168,85,247,0.3);
}

/* IMAGE */
.tile img {
  width:100%;
  aspect-ratio:16 / 9;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
}

/* TITLE */
.tile-title {
  margin-top:8px;
  font-size:14px;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

/* BUTTON */
.tile button {
  margin-top:auto;
  width:100%;
  padding:7px;
  cursor:pointer;
  border:none;
  border-radius:8px;
  background:#a855f7;
  color:white;
  font-size:13px;
}

/* TOAST */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: white;
  color: black;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 14px;
  opacity: 0;
  transition: all 0.25s ease;
  pointer-events: none;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="header">
  <h1 id="brand">MEDIA TILES</h1>
  <div id="contextTitle">Library</div>
  <div class="tabs" id="tabs"></div>
</div>

<input id="search" placeholder="Search tiles..." />

<div id="app">Loading...</div>

<div id="toast">Copied</div>

<script src="assets.js"></script>

<script>
let allItems = [];
let currentCategory = "all";

/* URL STATE */
const params = new URLSearchParams(window.location.search);
currentCategory = params.get("category") || "all";

/* COPY + TOAST */
function copy(text) {
  navigator.clipboard.writeText(text);
  showToast("Copied ✓");
}

function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;

  toast.style.opacity = "1";
  toast.style.transform = "translateX(-50%) translateY(0px)";

  setTimeout(() => {
    toast.style.opacity = "0";
    toast.style.transform = "translateX(-50%) translateY(10px)";
  }, 1100);
}

/* HOME BUTTON */
document.getElementById("brand").onclick = () => {
  window.location.href = "index.html";
};

/* HEADER CONTEXT */
function updateHeader() {
  const context = document.getElementById("contextTitle");

  if (currentCategory === "all") {
    context.textContent = "Library • All Media Tiles";
  } else {
    context.textContent = "Library • " + currentCategory.replace(/-/g, " ");
  }
}

/* TABS */
function buildTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";

  const tabList = ["all", ...categories];

  tabList.forEach(cat => {
    const div = document.createElement("div");
    div.className = "tab";

    if (cat === currentCategory) div.classList.add("active");

    div.textContent = cat.replace(/-/g, " ");

    div.onclick = () => {
      currentCategory = cat;

      const url = cat === "all"
        ? "browse.html"
        : `browse.html?category=${cat}`;

      history.pushState({}, "", url);

      updateHeader();
      loadData();
      updateTabs();
    };

    tabs.appendChild(div);
  });
}

/* TAB STATE */
function updateTabs() {
  document.querySelectorAll(".tab").forEach(tab => {
    const label = tab.textContent.toLowerCase().replace(/ /g, "-");

    if (
      (currentCategory === "all" && tab.textContent.toLowerCase() === "all") ||
      label === currentCategory
    ) {
      tab.classList.add("active");
    } else {
      tab.classList.remove("active");
    }
  });
}

/* LOAD DATA */
async function loadData() {
  const app = document.getElementById("app");
  app.innerHTML = "Loading...";

  const container = document.createElement("div");
  allItems = [];

  const list = currentCategory === "all"
    ? categories
    : [currentCategory];

  for (const cat of list) {
    try {
      const items = await fetchCategory(cat);
      allItems = allItems.concat(items);

      const section = document.createElement("section");

      const title = document.createElement("h2");
      title.textContent = `${cat.replace(/-/g, " ")} (${items.length})`;

      const grid = document.createElement("div");
      grid.className = "grid";

      items.forEach(item => {
        const tile = document.createElement("div");
        tile.className = "tile";

        tile.innerHTML = `
          <img src="${item.url}" onclick="copy('${item.url}')"/>
          <div class="tile-title">${item.name}</div>
          <button onclick="copy('${item.url}')">Copy Link</button>
        `;

        grid.appendChild(tile);
      });

      section.appendChild(title);
      section.appendChild(grid);
      container.appendChild(section);

    } catch (e) {
      console.error(e);
    }
  }

  app.innerHTML = "";
  app.appendChild(container);
}

/* SEARCH */
document.getElementById("search").addEventListener("input", (e) => {
  const q = e.target.value.toLowerCase();

  const filtered = allItems.filter(i =>
    i.name.toLowerCase().includes(q)
  );

  const app = document.getElementById("app");
  app.innerHTML = "";

  const grid = document.createElement("div");
  grid.className = "grid";

  filtered.forEach(item => {
    const tile = document.createElement("div");
    tile.className = "tile";

    tile.innerHTML = `
      <img src="${item.url}" onclick="copy('${item.url}')"/>
      <div class="tile-title">${item.name}</div>
      <button onclick="copy('${item.url}')">Copy Link</button>
    `;

    grid.appendChild(tile);
  });

  app.appendChild(grid);
});

/* BACK BUTTON */
window.addEventListener("popstate", () => {
  const params = new URLSearchParams(window.location.search);
  currentCategory = params.get("category") || "all";

  updateHeader();
  loadData();
  updateTabs();
});

/* INIT */
updateHeader();
buildTabs();
loadData();

</script>

</body>
</html>
