<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Media Tiles Ecosystem</title>

<style>
body {
  margin:0;
  background: radial-gradient(circle at top, #151515, #0b0b0b 60%);
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CONTAINER */
.container {
  text-align:center;
  max-width:900px;
}

/* BRAND */
h1 {
  font-size:52px;
  margin-bottom:10px;
  letter-spacing:2px;
  background: linear-gradient(90deg, #ffffff, #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 25px rgba(168,85,247,0.3);
}

/* SUBTEXT */
.sub {
  opacity:0.6;
  margin-bottom:50px;
  font-size:15px;
}

/* CARDS */
.cards {
  display:flex;
  gap:30px;
  justify-content:center;
  flex-wrap:wrap;
}

/* CARD */
.card {
  background:#181818;
  padding:26px;
  border-radius:16px;
  width:280px;
  cursor:pointer;
  text-align:left;

  border:1px solid rgba(255,255,255,0.05);

  transition: all 0.25s ease;
}

/* HOVER = HALO EFFECT */
.card:hover {
  transform:translateY(-6px) scale(1.02);
  background:#202020;
  box-shadow: 0 0 30px rgba(168,85,247,0.25);
  border-color: rgba(168,85,247,0.4);
}

/* TITLE */
.card h2 {
  margin:0 0 12px 0;
  font-size:20px;
}

/* TEXT */
.card p {
  font-size:14px;
  opacity:0.75;
  line-height:1.5;
}

/* FOOTER */
.footer {
  margin-top:50px;
  font-size:12px;
  opacity:0.4;
}
</style>
</head>

<body>

<div class="container">

  <h1>MEDIA TILES</h1>
  <div class="sub">Ecosystem Portal</div>

  <div class="cards">

    <!-- LIBRARY -->
    <div class="card" onclick="window.location.href='./browse.html'">
      <h2>📚 Library</h2>
      <p>Browse curated media tiles and copy direct asset links.</p>
    </div>

    <!-- TOOLS -->
    <div class="card" onclick="window.location.href='https://guyititian.github.io/media-lab/'">
      <h2>🛠 Tools</h2>
      <p>Bring your own media, process it, and generate outputs.</p>
    </div>

  </div>

  <div class="footer">
    Media-Tiles Ecosystem • Library + Tools
  </div>

</div>

</body>
</html>
