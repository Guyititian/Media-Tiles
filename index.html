<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Media Tiles</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;

      /* upgraded background */
      background: radial-gradient(circle at top, #1a1a1a 0%, #0b0b0b 60%, #000 100%);
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 70px 20px;
      text-align: center;
    }

    h1 {
      font-size: 46px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    p {
      opacity: 0.7;
      margin-bottom: 30px;
      font-size: 15px;
    }

    .cta {
      display: inline-block;
      padding: 14px 30px;
      background: linear-gradient(135deg, #ffffff, #cfcfcf);
      color: black;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      margin-bottom: 50px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      transition: 0.2s ease;
    }

    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-top: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 20px;
      border-radius: 14px;
      text-align: left;

      backdrop-filter: blur(8px);
      transition: 0.25s ease;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }

    .card:hover {
      transform: translateY(-4px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
    }

    .card h3 {
      margin: 0 0 8px;
      text-transform: capitalize;
      font-size: 18px;
    }

    .card p {
      font-size: 13px;
      margin: 0;
      opacity: 0.6;
    }

    a.card-link {
      text-decoration: none;
      color: inherit;
    }

    .footer {
      margin-top: 60px;
      font-size: 12px;
      opacity: 0.4;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Media Tiles</h1>
  <p>A structured visual library for franchises, genres, decades, and collections.</p>

  <a class="cta" href="browse.html">Enter Library</a>

  <div id="grid" class="grid"></div>

  <div class="footer">
    Media Tiles • Hosted on GitHub Pages
  </div>

</div>

<script src="assets.js"></script>

<script>
function prettyName(name) {
  return name.replace(/-/g, " ");
}

function renderCategories() {
  const grid = document.getElementById("grid");

  categories.forEach(cat => {
    const a = document.createElement("a");
    a.href = "browse.html";
    a.className = "card-link";

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${prettyName(cat)}</h3>
      <p>Browse ${prettyName(cat)} collection.</p>
    `;

    a.appendChild(card);
    grid.appendChild(a);
  });
}

renderCategories();
</script>

</body>
</html>
