<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Media Tiles Ecosystem</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial, sans-serif;
  color: white;

  /* RESTORED DEPTH BACKGROUND */
  background: radial-gradient(circle at top, #1b1b2a 0%, #0b0b10 55%, #050507 100%);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* MAIN LAYOUT */
.container {
  text-align: center;
  max-width: 900px;
  padding: 40px;
}

/* BRAND TILE (HERO FOCUS) */
.brand-tile {
  background: linear-gradient(145deg, #1e1e2e, #12121a);
  padding: 38px 28px;
  border-radius: 18px;

  box-shadow:
    0 0 40px rgba(140, 120, 255, 0.15),
    0 20px 60px rgba(0,0,0,0.6);

  margin-bottom: 30px;
}

.brand-title {
  font-size: 42px;
  font-weight: 700;
  letter-spacing: 1px;
}

.brand-sub {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.7;
}

/* NAV CARDS */
.cards {
  display: flex;
  justify-content: center;
  gap: 22px;
  flex-wrap: wrap;
}

/* RESTORED DEPTH CARDS */
.card {
  width: 300px;
  padding: 26px;
  border-radius: 16px;
  cursor: pointer;

  background: linear-gradient(145deg, #1a1a1a, #101010);

  box-shadow:
    0 10px 25px rgba(0,0,0,0.6),
    inset 0 0 0 1px rgba(255,255,255,0.04);

  transition: 0.25s ease;
  text-align: left;
}

.card:hover {
  transform: translateY(-6px) scale(1.01);
  box-shadow:
    0 18px 50px rgba(0,0,0,0.75),
    0 0 25px rgba(130, 110, 255, 0.25);
}

.card h2 {
  margin: 0 0 10px 0;
  font-size: 18px;
}

.card p {
  font-size: 13px;
  opacity: 0.7;
  line-height: 1.5;
}

/* FOOTER */
.footer {
  margin-top: 40px;
  font-size: 12px;
  opacity: 0.45;
}
</style>
</head>

<body>

<div class="container">

  <!-- BRAND HERO -->
  <div class="brand-tile">
    <div class="brand-title">Media Tiles</div>
    <div class="brand-sub">Ecosystem Portal — Library • Tools • Media Processing</div>
  </div>

  <!-- NAV -->
  <div class="cards">

    <div class="card" onclick="window.location.href='./browse.html'">
      <h2>📚 Library</h2>
      <p>Browse curated media tiles, explore collections, and copy direct asset links.</p>
    </div>

    <div class="card" onclick="window.location.href='https://guyititian.github.io/media-lab/'">
      <h2>🛠 Tools</h2>
      <p>Upload media, process GIF motion presets, and generate enhanced outputs.</p>
    </div>

  </div>

  <div class="footer">
    Media Tiles Ecosystem • Unified Library + Processing Tools
  </div>

</div>

</body>
</html>
