<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Media Tiles Ecosystem</title>

<style>
body {
  margin:0;
  background:#070707;
  color:white;
  font-family:Arial;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* PAGE WRAPPER */
.container {
  text-align:center;
  max-width:1000px;
}

/* =========================
   BRAND (ANCHOR OBJECT)
========================= */
.brand-shell {
  margin-bottom:50px;
}

.brand-core {
  font-size:60px;
  font-weight:600;

  padding:20px 40px;
  border-radius:20px;

  display:inline-block;

  background: rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.10);

  box-shadow:
    0 25px 70px rgba(0,0,0,0.75),
    0 0 50px rgba(255,255,255,0.10);

  backdrop-filter: blur(12px);

  letter-spacing:1px;
}

.brand-sub {
  margin-top:12px;
  font-size:13px;
  opacity:0.6;
}

/* =========================
   MAIN CARDS
========================= */
.cards {
  display:flex;
  justify-content:center;
  gap:40px;
}

.card {
  width:340px;
  padding:26px;

  border-radius:18px;

  background: rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);

  box-shadow: 0 20px 55px rgba(0,0,0,0.65);

  cursor:pointer;

  transition:0.25s ease;
}

.card:hover {
  transform:translateY(-10px);
  box-shadow:
    0 35px 90px rgba(0,0,0,0.85),
    0 0 35px rgba(255,255,255,0.12);
}

.card h2 {
  margin:0 0 10px;
  font-size:20px;
}

.card p {
  font-size:13px;
  opacity:0.7;
  line-height:1.4;
}

/* FOOTER */
.footer {
  margin-top:60px;
  font-size:12px;
  opacity:0.35;
}
</style>
</head>

<body>

<div class="container">

  <div class="brand-shell">
    <div class="brand-core">Media Tiles</div>
    <div class="brand-sub">Ecosystem Portal — Browse • Tools • Generate</div>
  </div>

  <div class="cards">
    <div class="card" onclick="window.location.href='./browse.html'">
      <h2>📚 Library</h2>
      <p>Curated media tiles with structured collections and asset links.</p>
    </div>

    <div class="card" onclick="window.location.href='https://guyititian.github.io/media-lab/'">
      <h2>🛠 Tools</h2>
      <p>Upload media and process it through generation presets and pipelines.</p>
    </div>
  </div>

  <div class="footer">
    Unified media ecosystem for browsing and transformation
  </div>

</div>

</body>
</html>
